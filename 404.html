<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | LivEra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --surface: #16161f; --accent: #c9a84c;
            --text: #eaeaf0; --text-dim: #8b8ba0; --text-muted: #5a5a72;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        /* Animated background */
        .bg-glow {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }
        .bg-glow-1 { top: -200px; left: -100px; }
        .bg-glow-2 { bottom: -200px; right: -100px; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        .error-container {
            position: relative; z-index: 10; text-align: center; padding: 40px 24px;
        }
        .error-code {
            font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #e0c56e, var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1; margin-bottom: 16px;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .error-title {
            font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 600;
            color: var(--text); margin-bottom: 12px;
        }
        .error-desc {
            font-size: 1rem; color: var(--text-dim); max-width: 460px; margin: 0 auto 36px;
            line-height: 1.7;
        }
        .error-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .err-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 12px; font-family: 'Inter', sans-serif;
            font-size: .9rem; font-weight: 700; text-decoration: none;
            transition: all .2s ease; cursor: pointer; border: none;
        }
        .err-btn-primary {
            background: var(--accent); color: #0a0a0f;
            box-shadow: 0 4px 20px rgba(201,168,76,0.3);
        }
        .err-btn-primary:hover { background: #e0c56e; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }
        .err-btn-outline {
            background: transparent; color: var(--text);
            border: 1.5px solid rgba(255,255,255,0.12);
        }
        .err-btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
        .error-home-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
            margin-bottom: 24px; font-size: 2rem; color: var(--accent);
        }
        .nav-mini {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 20;
        }
        .nav-mini a {
            font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 800;
            color: var(--text); text-decoration: none;
        }
        .nav-mini a span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="nav-mini">
        <a href="index.html"><span>Liv</span>Era</a>
    </div>

    <div class="error-container">
        <div class="error-home-icon"><i class="fas fa-home"></i></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">
            Looks like this page has moved out! The page you're looking for doesn't exist or may have been relocated. Let's get you back home.
        </p>
        <div class="error-actions">
            <a href="index.html" class="err-btn err-btn-primary">
                <i class="fas fa-home"></i> Go to Homepage
            </a>
            <a href="explore.html" class="err-btn err-btn-outline">
                <i class="fas fa-search"></i> Explore Properties
            </a>
        </div>
    </div>
</body>
</html>
